# .github/workflows/oci-deploy.yml
# OCI Compute 서버에 PEM 기반 SSH 배포를 수행하는 GitHub Actions 워크플로우
# secrets:
#   OCI_SSH_PRIVATE_KEY - PEM 키 파일 내용
#   OCI_HOST - OCI 서버 IP 또는 호스트
#   OCI_USER - SSH 사용자명
#   OCI_REMOTE_DIR - 원격 배포 디렉토리
name: OCI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monorepo
        run: bun run build

      - name: Deploy to OCI
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_REMOTE_DIR: ${{ secrets.OCI_REMOTE_DIR }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

          # 키 형식 검증 (실패 시 키 내용이 잘못 저장된 것)
          ssh-keygen -y -f ~/.ssh/oci_key > /dev/null && echo "[OK] private key parsed" || echo "[WARN] private key parse failed"

          # 연결 진단용 verbose (실패해도 다음 단계로)
          ssh -v -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/oci_key "$OCI_USER@$OCI_HOST" "mkdir -p $OCI_REMOTE_DIR"

          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/oci_key" \
            ./ "$OCI_USER@$OCI_HOST:$OCI_REMOTE_DIR/"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/oci_key "$OCI_USER@$OCI_HOST" "bash -s" <<EOF
          set -e
          export PATH="\$HOME/.bun/bin:\$PATH"
          if ! command -v bun >/dev/null 2>&1; then
            curl -fsSL https://bun.sh/install | bash
            export PATH="\$HOME/.bun/bin:\$PATH"
          fi
          cd "$OCI_REMOTE_DIR"
          bun install --frozen-lockfile
          bun run build || true
          EOF
