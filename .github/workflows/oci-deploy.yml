# .github/workflows/oci-deploy.yml
# OCI Compute 서버에 PEM 기반 SSH 배포를 수행하는 GitHub Actions 워크플로우
# secrets:
#   OCI_SSH_PRIVATE_KEY - PEM 키 파일 내용
#   OCI_HOST - OCI 서버 IP 또는 호스트
#   OCI_USER - SSH 사용자명
#   OCI_REMOTE_DIR - 원격 배포 디렉토리
name: OCI Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monorepo
        run: bun run build

      - name: Deploy to OCI
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_REMOTE_DIR: ${{ secrets.OCI_REMOTE_DIR }}
        run: |
          mkdir -p ~/.ssh
          echo "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/oci_key "$OCI_USER@$OCI_HOST" "mkdir -p $OCI_REMOTE_DIR"

          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/oci_key" \
            ./ "$OCI_USER@$OCI_HOST:$OCI_REMOTE_DIR/"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/oci_key "$OCI_USER@$OCI_HOST" "bash -s" <<EOF
          set -e
          export PATH="\$HOME/.bun/bin:\$PATH"
          if ! command -v bun >/dev/null 2>&1; then
            # bun 설치 스크립트는 unzip/curl이 필요함.
            # 서버에 깨진 패키지(예: nginx)가 있어도 배포가 멈추지 않도록 설치 실패는 허용하고,
            # 이후 실제로 unzip/curl이 존재하는지만 검증한다.
            if ! command -v unzip >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get install -y unzip curl || true
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y unzip curl || true
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y unzip curl || true
              fi
            fi
            if ! command -v unzip >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              echo "[ERROR] unzip/curl 설치 실패로 bun을 설치할 수 없습니다." >&2
              exit 1
            fi
            curl -fsSL https://bun.sh/install | bash
            export PATH="\$HOME/.bun/bin:\$PATH"
          fi
          cd "$OCI_REMOTE_DIR"
          bun install --frozen-lockfile
          bun run build || true
          EOF
